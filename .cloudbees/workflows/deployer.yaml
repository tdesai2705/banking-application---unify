apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: deployer
on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      manifest:
        type: string
        required: true
  workflow_dispatch:
jobs:
  banking-app:
    if: ${{ fromJSON(inputs.manifest)['banking-app']['tejasdesai27/banking-app'].deploy }}
    uses: tdesai2705/banking-app/.cloudbees/workflows/deploy.yaml
    with:
      artifact-id: ${{ fromJSON(inputs.manifest)['banking-app']['tejasdesai27/banking-app'].id }}
      environment: ${{ inputs.environment }}
      artifact-url: ${{ fromJSON(inputs.manifest)['banking-app']['tejasdesai27/banking-app'].url }}
    secrets: inherit
    vars: inherit